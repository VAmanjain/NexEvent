spring.application.name=NexEvent
spring.datasource.url=jdbc:postgresql://localhost:5432/NexEvent
spring.datasource.username=postgres
spring.datasource.password=YOUR DATABASE PASSWORD
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8091
spring.security.user.name=admin
spring.security.user.password=YOUR ADMIN PASSWORD
security.jwt.secret-key=YOUR JWT SECURITY KEY
## 24h / 1 day in millisecond
security.jwt.expiration-time=86400000


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR EMAIL ID
spring.mail.password=YOUR EMAIL PASSKEY 
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true